stages:
  - prepare
  - prepare2
  - pack
  - deploy
  - deploy2

variables:
  GIT_DEPTH: "1"

fail_if_banned_files:
  stage: prepare
  dependencies: []
  tags:
    - linux
  script: |
    banned_files=(script/procedure.lua script/utility.lua script/constant.lua)
    for file in "${banned_files[@]}"; do
      if [ -f "$file" ]; then
        echo "Banned file found: $file"
        exit 1
      fi
    done

merge_databases:
  stage: prepare
  dependencies: []
  tags:
    - linux
  script:
    - apt update --allow-insecure-repositories && apt -y install sqlite3
    - ls -1 *.cdb | sed -e '/test-update.*\.cdb$/d' -e '/script-fix.*\.cdb$/d' | xargs -I '{}' sqlite3 '{}' .dump | sqlite3 test-release.cdb || true
    - ls -1 test-update*.cdb | xargs -I '{}' sqlite3 '{}' .dump | sqlite3 test-update.cdb || true
  artifacts:
    paths:
      - test-release.cdb
      - test-update.cdb

.prepare_jest_env:
  stage: prepare
  dependencies: []
  tags:
    - linux
  variables:
    YGOPRO_SCRIPTS_888_BRANCH: master
  script:
    - mkdir ygopro
    - ./scripts/prepare-ygopro-scripts-888.sh ygopro/script "$YGOPRO_SCRIPTS_888_BRANCH" 1
    - wget https://code.moenext.com/mycard/ygopro-database/-/raw/master/locales/zh-CN/cards.cdb -O ygopro/test.cdb
  artifacts:
    paths:
      - ygopro

prepare_jest_env_master:
  extends: .prepare_jest_env
  variables:
    YGOPRO_SCRIPTS_888_BRANCH: master

prepare_jest_env_no_mc:
  extends: .prepare_jest_env
  variables:
    YGOPRO_SCRIPTS_888_BRANCH: no-mc

npm_ci:
  stage: prepare
  dependencies: []
  tags:
    - linux
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules

strip_rc_databases:
  stage: prepare2
  dependencies:
    - merge_databases
    - npm_ci
  tags:
    - linux
  script:
    - ./node_modules/.bin/ts-node scripts/strip-rc-databases.ts test-release.cdb test-update.cdb
  artifacts:
    paths:
      - test-release.cdb
      - test-update.cdb

.add_script_diff:
  stage: prepare
  dependencies: []
  tags:
    - linux
  variables:
    YGOPRO_SCRIPTS_888_BRANCH: master
  script:
    - ./scripts/prepare-ygopro-scripts-888.sh ygopro-scripts-888 "$YGOPRO_SCRIPTS_888_BRANCH"
    - cd ygopro-scripts-888
    - git remote add stable https://github.com/mycard/ygopro-scripts
    - git fetch stable refs/heads/master
    # now FETCH_HEAD is the commit of stable/master
    - |
      copy_out() {
        target=../script/$1
        if [ -f "$target" ]; then
          echo "File $target already exists, skipping copy."
        elif [ -f "$1" ]; then
          echo "Copying $1 to $target"
          cp "$1" ../script/
        else
          echo "File $1 not found, skipping."
        fi
      }
      for file in $(git diff --name-only --diff-filter=A FETCH_HEAD -- '*.lua'); do
        copy_out "$file"
      done
      for file in $(git diff --name-only --diff-filter=M FETCH_HEAD -- '*.lua'); do
        if [ -f "$file" ]; then
          current_time=$(git log -1 --format="%ct" HEAD -- "$file")
          stable_time=$(git log -1 --format="%ct" FETCH_HEAD -- "$file")
          if [ -n "$current_time" ] && [ -n "$current_time" ] && [ "$current_time" -lt "$stable_time" ]; then
            echo "File $file is older than stable/master, skipping copy."
          else
            copy_out "$file"
          fi
        fi
      done
    - cd ..
  artifacts:
    paths:
      - script

add_script_diff_master:
  extends: .add_script_diff
  variables:
    YGOPRO_SCRIPTS_888_BRANCH: master

add_script_diff_no_mc:
  extends: .add_script_diff
  variables:
    YGOPRO_SCRIPTS_888_BRANCH: no-mc

prepare_server_lflist:
  stage: prepare
  dependencies: []
  tags:
    - linux
  script:
    - mkdir dist
    - git clone --depth=1 --branch=server https://code.moenext.com/mycard/ygopro.git ygopro-server
    - cd ygopro-server
    - git fetch --depth=1 origin master
    - |
      server_time=$(git log -1 --format=%ct HEAD -- lflist.conf || true)
      master_time=$(git log -1 --format=%ct FETCH_HEAD -- lflist.conf || true)
      if [ -n "$server_time" ] && { [ -z "$master_time" ] || [ "$server_time" -gt "$master_time" ]; }; then
        cp lflist.conf ../dist/
      fi
  artifacts:
    paths:
      - dist

prepare_wasm_bin:
  stage: prepare
  dependencies: []
  tags:
    - linux
  image: git-registry.moenext.com/mycard/docker-ygopro-builder:debian12
  script:
    - emcc --version
    - mkdir wasm-build
    - git clone --depth=1 -b 888 https://code.moenext.com/nanahira/ygopro-core wasm-build/ocgcore
    - cd wasm-build
    - wget -O - https://mat-cacher.moenext.com/https://www.lua.org/ftp/lua-5.4.8.tar.gz | tar zfx -
    - mv lua-5.4.8 lua
    - cp ocgcore/premake/lua.lua lua/premake5.lua
    - |
      if command -v premake5 >/dev/null 2>&1; then
        ln -sf "$(command -v premake5)" premake5
      else
        wget -O - https://cdn02.moecube.com:444/premake5-built/premake-5.0.0-beta8-linux.tar.gz | tar zfx -
        chmod +x premake5
      fi
    - cd ocgcore
    - ln -sf premake/dll.lua .
    - ../premake5 gmake --file=dll.lua --os=emscripten
    - cd build
    - make config=release_wasm_cjs -j$(nproc)
    - cd ../../..
    - mkdir -p wasm-bin
    - cp wasm-build/ocgcore/build/bin/wasm_cjs/Release/libocgcore.wasm wasm-bin/libocgcore.wasm
  artifacts:
    paths:
      - wasm-bin

.json:
  stage: prepare2
  dependencies:
    - merge_databases
  tags:
    - linux
  image: git-registry.moenext.com/mycard/ygopro-cdb-descgen:master-x86
  variables:
    YGOPRO_PIC_URL_PREFIX: 'https://cdntx.moecube.com/ygopro-super-pre/data/pics/'
    YGOPRO_PIC_URL_SUFFIX: '.jpg?version=19.7'
    FIELDS: 'name,desc,overallString,picUrl'
    GIT_DEPTH: '1000'
    OUTPUT_FILENAME: test-release.json
    REF_COMMIT: '26.7' # 更新的时候改这里，修改成上一个tag的版本号
  script:
    - apt update;apt -y install wget
    - currentPath=$PWD
    - cd /usr/src/app
    - wget -O strings.conf https://code.moenext.com/mycard/ygopro-database/-/raw/master/locales/zh-CN/strings.conf
    - env GIT_PATH=$currentPath node dist $currentPath/test-release.cdb ./strings.conf $currentPath/test-strings.conf > $currentPath/$OUTPUT_FILENAME
    - cd $currentPath
  artifacts:
    paths:
      - test-release.json

json:
  extends: .json

json2:
  extends: .json
  variables:
    FIELDS: 'id,name,desc,overallString,picUrl,createTime,createCommit,updateTime,updateCommit,created,updated'
    OUTPUT_FILENAME: test-release-v2.json
  artifacts:
    paths:
      - test-release-v2.json

